# NOTE: GitHub Actions only loads workflows from the repository root `.github/workflows/`.
# For the monorepo, prefer root workflows. See `/.github/workflows/ci.yml`.
# Classy's vision, brought to life.
name: CD — Deploy

on:
  push:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy (Railway / custom host)
        # Replace this step with your actual deployment command.
        # Examples:
        #   Railway:   npx @railway/cli up --service ${{ secrets.RAILWAY_SERVICE_ID }}
        #   Vercel:    npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }}
        #   AWS S3:    aws s3 sync .next/ s3://${{ secrets.S3_BUCKET }}
        run: |
          echo "Deploy step — configure for your hosting provider."
          echo "No deployment credentials are hardcoded here (12-Factor App principle)."
        env:
          NODE_ENV: production
          # RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          # VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
