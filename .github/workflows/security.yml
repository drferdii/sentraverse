# Standalone repo security audit (drferdii/sentraverse) — pnpm.
# Architected and built by Classy.
name: Security — Dependency Audit

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Mingguan, Senin 08:00 UTC
    - cron: '0 8 * * 1'

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Audit (production deps, high+)
        run: pnpm audit --prod --audit-level high

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: License report + guard copyleft kuat
        run: |
          pnpm licenses list --prod --long > licenses.txt || true
          head -60 licenses.txt
          if grep -E "GPL-3\.0|AGPL" licenses.txt; then
            echo "::error::Strong copyleft license terdeteksi pada dependensi produksi"
            exit 1
          fi
